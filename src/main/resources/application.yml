spring:
  datasource:
    url: ${DATASOURCE_URL:jdbc:postgresql://localhost:5432/parksync}
    username: ${DATASOURCE_USER:parksync}
    password: ${DATASOURCE_PASSWORD:parksync}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

server:
  # NFR-12: HTTPS obligatorio — TLS 1.2 o superior (Design Doc §12.3)
  ssl:
    enabled: ${SSL_ENABLED:false}           # true en producción
    key-store: ${SSL_KEYSTORE_PATH:}        # ruta al .p12 o .jks
    key-store-password: ${SSL_KEYSTORE_PASSWORD:}
    key-store-type: PKCS12
    protocol: TLS
    enabled-protocols: TLSv1.2,TLSv1.3     # nunca TLS 1.0 ni 1.1
  port: ${SERVER_PORT:8080}                 # 8443 en producción con SSL

# Secreto JWT inyectado como variable de entorno — nunca hardcodeado (Design Doc §12.2)
parksync:
  jwt:
    secret: ${JWT_SECRET:dev-secret-at-least-32-chars-long!!}

logging:
  level:
    com.parksync: INFO
  pattern:
    console: "%d{HH:mm:ss} %-5level [%thread] %logger{36} correlationId=%X{correlationId} - %msg%n"
